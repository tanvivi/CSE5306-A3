# ─────────────────────────────────────────────────────────────────────────────
#  Raft Cluster  (5 nodes, Q3 + Q4)
# ─────────────────────────────────────────────────────────────────────────────
  raft-node1:
    build:
      context: .
      dockerfile: services/raft/Dockerfile
    container_name: raft-node1
    ports:
      - "50061:50060"
    environment:
      - NODE_ID=raft-node1
      - PORT=50060
      - PEERS=raft-node2:50060,raft-node3:50060,raft-node4:50060,raft-node5:50060

  raft-node2:
    build:
      context: .
      dockerfile: services/raft/Dockerfile
    container_name: raft-node2
    ports:
      - "50062:50060"
    environment:
      - NODE_ID=raft-node2
      - PORT=50060
      - PEERS=raft-node1:50060,raft-node3:50060,raft-node4:50060,raft-node5:50060

  raft-node3:
    build:
      context: .
      dockerfile: services/raft/Dockerfile
    container_name: raft-node3
    ports:
      - "50063:50060"
    environment:
      - NODE_ID=raft-node3
      - PORT=50060
      - PEERS=raft-node1:50060,raft-node2:50060,raft-node4:50060,raft-node5:50060

  raft-node4:
    build:
      context: .
      dockerfile: services/raft/Dockerfile
    container_name: raft-node4
    ports:
      - "50064:50060"
    environment:
      - NODE_ID=raft-node4
      - PORT=50060
      - PEERS=raft-node1:50060,raft-node2:50060,raft-node3:50060,raft-node5:50060

  raft-node5:
    build:
      context: .
      dockerfile: services/raft/Dockerfile
    container_name: raft-node5
    ports:
      - "50065:50060"
    environment:
      - NODE_ID=raft-node5
      - PORT=50060
      - PEERS=raft-node1:50060,raft-node2:50060,raft-node3:50060,raft-node4:50060